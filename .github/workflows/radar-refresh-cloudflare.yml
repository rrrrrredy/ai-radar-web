name: Radar Refresh Cloudflare

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Activation mode"
        required: true
        default: "mock"
        type: choice
        options:
          - mock
          - live
      persist:
        description: "Persist successful chunks and report candidates to Supabase"
        required: true
        default: false
        type: boolean
      limit:
        description: "Maximum sources to activate"
        required: true
        default: "30"
        type: string
      chunk_size:
        description: "Sources per activation chunk"
        required: true
        default: "5"
        type: string
      max_items_per_source:
        description: "Maximum items collected from each source"
        required: true
        default: "3"
        type: string
      deploy_cloudflare:
        description: "Deploy the Cloudflare Pages public mirror"
        required: true
        default: false
        type: boolean
      generate_reports:
        description: "Generate daily and weekly report candidates"
        required: true
        default: true
        type: boolean
      run_events_cluster:
        description: "Run deterministic event clustering after activation"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: radar-refresh-cloudflare-${{ github.ref }}
  cancel-in-progress: false

env:
  ENABLE_SUPABASE_RETRIEVAL: "true"
  ENABLE_SUPABASE_WRITES: "false"
  ENABLE_SCHEDULED_PERSISTENCE: "false"
  ENABLE_LIVE_DEEPSEEK_IN_JOBS: "false"
  ENABLE_ADMIN_REVIEW_WRITES: "false"
  ENABLE_X_API: "false"
  ENABLE_WECHAT_AUTH: "false"
  NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  refresh:
    name: Reviewed refresh and Cloudflare build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate dispatch inputs
        id: dispatch_validation
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          PERSIST: ${{ inputs.persist }}
          LIMIT: ${{ inputs.limit }}
          CHUNK_SIZE: ${{ inputs.chunk_size }}
          MAX_ITEMS_PER_SOURCE: ${{ inputs.max_items_per_source }}
          DEPLOY_CLOUDFLARE: ${{ inputs.deploy_cloudflare }}
          GENERATE_REPORTS: ${{ inputs.generate_reports }}
          RUN_EVENTS_CLUSTER: ${{ inputs.run_events_cluster }}
          DISPATCH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail

          validate_boolean() {
            local name="$1"
            local value="$2"
            case "$value" in
              true|false) ;;
              *)
                echo "::error title=Invalid dispatch input::${name} must be true or false."
                exit 1
                ;;
            esac
          }

          validate_integer() {
            local name="$1"
            local value="$2"
            local minimum="$3"
            local maximum="$4"
            if [[ ! "$value" =~ ^[0-9]+$ || ${#value} -gt 4 ]]; then
              echo "::error title=Invalid dispatch input::${name} must be an integer from ${minimum} to ${maximum}."
              exit 1
            fi

            local number=$((10#$value))
            if (( number < minimum || number > maximum )); then
              echo "::error title=Invalid dispatch input::${name} must be an integer from ${minimum} to ${maximum}."
              exit 1
            fi
          }

          case "$MODE" in
            mock|live) ;;
            *)
              echo "::error title=Invalid dispatch input::mode must be mock or live."
              exit 1
              ;;
          esac

          validate_boolean persist "$PERSIST"
          validate_boolean deploy_cloudflare "$DEPLOY_CLOUDFLARE"
          validate_boolean generate_reports "$GENERATE_REPORTS"
          validate_boolean run_events_cluster "$RUN_EVENTS_CLUSTER"
          validate_integer limit "$LIMIT" 1 100
          validate_integer chunk_size "$CHUNK_SIZE" 1 20
          validate_integer max_items_per_source "$MAX_ITEMS_PER_SOURCE" 1 20

          if (( 10#$CHUNK_SIZE > 10#$LIMIT )); then
            echo "::error title=Invalid dispatch input::chunk_size cannot exceed limit."
            exit 1
          fi

          if [[ "$PERSIST" == "true" && "$MODE" != "live" ]]; then
            echo "::error title=Unsafe persistence request::persist=true requires mode=live; mock data cannot be written."
            exit 1
          fi

          if [[ "$MODE" == "live" && "$DISPATCH_REF" != "refs/heads/main" ]]; then
            echo "::error title=Unsafe live request::Live provider access must run from refs/heads/main."
            exit 1
          fi

          if [[ "$GENERATE_REPORTS" == "true" && "$RUN_EVENTS_CLUSTER" != "true" ]]; then
            echo "::error title=Invalid report request::Event-aware report generation requires run_events_cluster=true."
            exit 1
          fi

          if [[ "$DEPLOY_CLOUDFLARE" == "true" && "$DISPATCH_REF" != "refs/heads/main" ]]; then
            echo "::error title=Unsafe deployment request::Cloudflare production deploys must run from refs/heads/main."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validation preflight
        id: validation_preflight
        run: |
          npm run lint
          npm run typecheck
          npm run test
          npm run validate:data
          npm run sensitive:scan
          npm run supabase:public-contract

      - name: Capture before counts
        id: before_summary
        shell: bash
        env:
          ENABLE_SUPABASE_WRITES: "false"
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
          RUN_ID: github_${{ github.run_id }}_${{ github.run_attempt }}
          MODE: ${{ inputs.mode }}
          PERSIST: ${{ inputs.persist }}
          DEPLOY_CLOUDFLARE: ${{ inputs.deploy_cloudflare }}
          GENERATE_REPORTS: ${{ inputs.generate_reports }}
          RUN_EVENTS_CLUSTER: ${{ inputs.run_events_cluster }}
          WRITE_GATE_SATISFIED: ${{ inputs.persist && vars.RADAR_REFRESH_WRITE_GATE == 'true' }}
        run: |
          set -euo pipefail
          npm run ops:summary -- \
            --stage before \
            --run-id "$RUN_ID" \
            --mode "$MODE" \
            --persist "$PERSIST" \
            --deploy-cloudflare "$DEPLOY_CLOUDFLARE" \
            --generate-reports "$GENERATE_REPORTS" \
            --run-events-cluster "$RUN_EVENTS_CLUSTER" \
            --write-gate-satisfied "$WRITE_GATE_SATISFIED"

      - name: Check explicit write gate
        if: ${{ inputs.persist }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${RADAR_REFRESH_WRITE_GATE}" != "true" ]; then
            echo "Persist requested, but RADAR_REFRESH_WRITE_GATE is not true. No Supabase writes were attempted."
            exit 1
          fi
        env:
          RADAR_REFRESH_WRITE_GATE: ${{ vars.RADAR_REFRESH_WRITE_GATE }}

      - name: Restore resumable activation state
        id: activation_cache_restore
        uses: actions/cache/restore@v4
        with:
          path: data/activation
          key: radar-activation-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            radar-activation-${{ github.run_id }}-

      - name: Run resumable activation
        id: activation
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          PERSIST: ${{ inputs.persist }}
          LIMIT: ${{ inputs.limit }}
          CHUNK_SIZE: ${{ inputs.chunk_size }}
          MAX_ITEMS_PER_SOURCE: ${{ inputs.max_items_per_source }}
          ENABLE_SUPABASE_WRITES: ${{ github.ref == 'refs/heads/main' && inputs.persist && vars.RADAR_REFRESH_WRITE_GATE == 'true' && 'true' || 'false' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.ref == 'refs/heads/main' && inputs.persist && vars.RADAR_REFRESH_WRITE_GATE == 'true' && secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
          DEEPSEEK_API_KEY: ${{ github.ref == 'refs/heads/main' && inputs.mode == 'live' && secrets.DEEPSEEK_API_KEY || '' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          args=(
            --limit "$LIMIT"
            --chunk-size "$CHUNK_SIZE"
            --max-items-per-source "$MAX_ITEMS_PER_SOURCE"
            --resume
          )
          if [[ "$PERSIST" == "true" ]]; then
            args+=(--persist)
          fi
          npm run "data:activate:resumable:${MODE}" -- "${args[@]}"

      - name: Save resumable activation state
        if: ${{ always() && hashFiles('data/activation/latest/checkpoint.json') != '' }}
        uses: actions/cache/save@v4
        with:
          path: data/activation
          key: radar-activation-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Cluster public events
        id: events_cluster
        if: ${{ inputs.run_events_cluster }}
        shell: bash
        env:
          PERSIST: ${{ inputs.persist }}
          ENABLE_SUPABASE_WRITES: ${{ github.ref == 'refs/heads/main' && inputs.persist && vars.RADAR_REFRESH_WRITE_GATE == 'true' && 'true' || 'false' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.ref == 'refs/heads/main' && inputs.persist && vars.RADAR_REFRESH_WRITE_GATE == 'true' && secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
        run: |
          set -euo pipefail
          if [[ "$PERSIST" == "true" ]]; then
            npm run events:cluster -- --persist
          else
            npm run events:cluster
          fi

      - name: Generate report candidates
        id: reports
        if: ${{ inputs.generate_reports }}
        shell: bash
        env:
          MODE: ${{ inputs.mode }}
          PERSIST: ${{ inputs.persist }}
          ENABLE_SUPABASE_WRITES: ${{ github.ref == 'refs/heads/main' && inputs.persist && vars.RADAR_REFRESH_WRITE_GATE == 'true' && 'true' || 'false' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.ref == 'refs/heads/main' && inputs.persist && vars.RADAR_REFRESH_WRITE_GATE == 'true' && secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
          DEEPSEEK_API_KEY: ${{ github.ref == 'refs/heads/main' && inputs.mode == 'live' && secrets.DEEPSEEK_API_KEY || '' }}
        run: |
          set -euo pipefail
          if [[ "$PERSIST" == "true" ]]; then
            npm run report:candidate:daily:write -- --live
            npm run report:candidate:weekly:write -- --live
          elif [[ "$MODE" == "live" ]]; then
            npm run report:generate:daily:live
            npm run report:generate:weekly:live
          else
            npm run report:generate:daily
            npm run report:generate:weekly
          fi

      - name: Build Cloudflare public snapshot
        id: cloudflare_build
        env:
          CLOUDFLARE_SNAPSHOT_READ_SUPABASE: "true"
          CLOUDFLARE_SNAPSHOT_REQUIRE_SUPABASE: "true"
          ENABLE_SUPABASE_WRITES: "false"
        run: npm run cloudflare:build

      - name: Validate built Cloudflare artifact
        env:
          ENABLE_SUPABASE_WRITES: "false"
          SMOKE_REQUIRE_RELEASE_ARTIFACTS: "true"
        run: npx tsx scripts/smoke-test.ts

      - name: Deploy Cloudflare Pages
        id: cloudflare_deploy
        if: ${{ inputs.deploy_cloudflare }}
        shell: bash
        env:
          ENABLE_SUPABASE_WRITES: "false"
          CLOUDFLARE_API_TOKEN: ${{ github.ref == 'refs/heads/main' && secrets.CLOUDFLARE_API_TOKEN || '' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ github.ref == 'refs/heads/main' && secrets.CLOUDFLARE_ACCOUNT_ID || '' }}
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" || -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "::error title=Cloudflare configuration missing::Deploy requested, but the Cloudflare token or account id is unavailable."
            exit 1
          fi
          test -s dist/cloudflare-pages/index.html
          npx --yes wrangler@4.86.0 pages deploy dist/cloudflare-pages --project-name=ai-industry-radar --branch=main

      - name: Write run summary
        id: after_summary
        if: ${{ always() }}
        shell: bash
        env:
          ENABLE_SUPABASE_WRITES: "false"
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
          RUN_ID: github_${{ github.run_id }}_${{ github.run_attempt }}
          MODE: ${{ inputs.mode }}
          PERSIST: ${{ inputs.persist }}
          DEPLOY_CLOUDFLARE: ${{ inputs.deploy_cloudflare }}
          GENERATE_REPORTS: ${{ inputs.generate_reports }}
          RUN_EVENTS_CLUSTER: ${{ inputs.run_events_cluster }}
          WRITE_GATE_SATISFIED: ${{ inputs.persist && vars.RADAR_REFRESH_WRITE_GATE == 'true' }}
          VALIDATION_OUTCOME: ${{ steps.validation_preflight.outcome || 'skipped' }}
          ACTIVATION_OUTCOME: ${{ steps.activation.outcome || 'skipped' }}
          EVENTS_CLUSTER_OUTCOME: ${{ steps.events_cluster.outcome || 'skipped' }}
          REPORTS_OUTCOME: ${{ steps.reports.outcome || 'skipped' }}
          CLOUDFLARE_BUILD_OUTCOME: ${{ steps.cloudflare_build.outcome || 'skipped' }}
          CLOUDFLARE_DEPLOY_OUTCOME: ${{ steps.cloudflare_deploy.outcome || 'skipped' }}
          CLOUDFLARE_URL: https://ai-industry-radar.pages.dev
        run: |
          set -euo pipefail
          npm run ops:summary -- \
            --stage after \
            --run-id "$RUN_ID" \
            --mode "$MODE" \
            --persist "$PERSIST" \
            --deploy-cloudflare "$DEPLOY_CLOUDFLARE" \
            --generate-reports "$GENERATE_REPORTS" \
            --run-events-cluster "$RUN_EVENTS_CLUSTER" \
            --write-gate-satisfied "$WRITE_GATE_SATISFIED" \
            --validation-outcome "$VALIDATION_OUTCOME" \
            --activation-outcome "$ACTIVATION_OUTCOME" \
            --events-cluster-outcome "$EVENTS_CLUSTER_OUTCOME" \
            --reports-outcome "$REPORTS_OUTCOME" \
            --cloudflare-build-outcome "$CLOUDFLARE_BUILD_OUTCOME" \
            --cloudflare-deploy-outcome "$CLOUDFLARE_DEPLOY_OUTCOME" \
            --cloudflare-url "$CLOUDFLARE_URL"

      - name: Verify run summary contains no configured secrets
        id: summary_safety
        if: ${{ always() }}
        shell: bash
        env:
          DEEPSEEK_API_KEY: ${{ github.ref == 'refs/heads/main' && inputs.mode == 'live' && secrets.DEEPSEEK_API_KEY || '' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ github.ref == 'refs/heads/main' && inputs.deploy_cloudflare && secrets.CLOUDFLARE_API_TOKEN || '' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ github.ref == 'refs/heads/main' && inputs.deploy_cloudflare && secrets.CLOUDFLARE_ACCOUNT_ID || '' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          files=(
            data/ops/latest/radar-refresh-summary.json
            data/ops/latest/radar-refresh-summary.md
          )
          for file in "${files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "::error title=Run summary missing::${file} was not created."
              exit 1
            fi
          done

          configured_secrets=(
            "${DEEPSEEK_API_KEY:-}"
            "${SUPABASE_SERVICE_ROLE_KEY:-}"
            "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}"
            "${CLOUDFLARE_API_TOKEN:-}"
            "${CLOUDFLARE_ACCOUNT_ID:-}"
            "${GITHUB_TOKEN:-}"
          )
          for secret in "${configured_secrets[@]}"; do
            if (( ${#secret} < 4 )); then
              continue
            fi
            for file in "${files[@]}"; do
              if grep -Fq -- "$secret" "$file"; then
                echo "::error title=Unsafe run summary::A configured secret was found in the summary; artifact upload is blocked."
                exit 1
              fi
            done
          done

      - name: Upload run summary artifact
        if: ${{ always() && steps.summary_safety.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: radar-refresh-cloudflare-summary-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            data/ops/latest/radar-refresh-summary.json
            data/ops/latest/radar-refresh-summary.md
          if-no-files-found: error
          retention-days: 14
