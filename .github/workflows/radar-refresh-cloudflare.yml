name: Radar Daily Production Refresh

on:
  schedule:
    # Three non-round launch windows provide time for a full refresh and recovery
    # before the 09:00 Asia/Shanghai freshness target.
    - cron: "17 6 * * *"
      timezone: "Asia/Shanghai"
    - cron: "17 7 * * *"
      timezone: "Asia/Shanghai"
    - cron: "17 8 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum sources to refresh in the production run"
        required: true
        default: "30"
        type: string
      chunk_size:
        description: "Sources per resumable activation chunk"
        required: true
        default: "5"
        type: string
      max_items_per_source:
        description: "Maximum items collected from each source"
        required: true
        default: "3"
        type: string

permissions:
  contents: read

concurrency:
  group: radar-production-refresh
  cancel-in-progress: false

jobs:
  freshness_gate:
    name: Check whether production is already fresh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.freshness.outputs.should_run }}
      reason: ${{ steps.freshness.outputs.reason }}
    steps:
      - name: Decide whether a scheduled refresh is needed
        id: freshness
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE_EXPRESSION: ${{ github.event.schedule || '' }}
        run: |
          set -euo pipefail
          node <<'NODE'
          import * as fs from "node:fs";
          const eventName = process.env.EVENT_NAME || "";
          const scheduleExpression = process.env.SCHEDULE_EXPRESSION || "";
          const outputPath = process.env.GITHUB_OUTPUT;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;

          function writeDecision(shouldRun, reason, detail) {
            fs.appendFileSync(outputPath, `should_run=${shouldRun}\nreason=${reason}\n`);
            fs.appendFileSync(
              summaryPath,
              [
                "## AI 行业信息雷达新鲜度门控",
                "",
                `- Trigger: ${eventName}`,
                `- Schedule: ${scheduleExpression || "manual"}`,
                `- Decision: ${shouldRun === "true" ? "run production refresh" : "skip; production is already fresh"}`,
                `- Reason: ${detail}`,
                "- Production URL: https://ai-industry-radar.pages.dev/",
                ""
              ].join("\n")
            );
          }

          function shanghaiParts(value) {
            const parts = new Intl.DateTimeFormat("en-CA", {
              timeZone: "Asia/Shanghai",
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
              hour: "2-digit",
              minute: "2-digit",
              hourCycle: "h23"
            }).formatToParts(value);
            return Object.fromEntries(parts.map((part) => [part.type, part.value]));
          }

          if (eventName === "workflow_dispatch") {
            writeDecision("true", "manual_dispatch", "Manual runs always execute after passing production gates.");
            process.exit(0);
          }

          try {
            const cacheBust = encodeURIComponent(`${Date.now()}-${Math.random()}`);
            const response = await fetch(
              `https://ai-industry-radar.pages.dev/data/radar-snapshot.json?freshness=${cacheBust}`,
              { cache: "no-store", signal: AbortSignal.timeout(15000) }
            );
            if (!response.ok) throw new Error(`snapshot_http_${response.status}`);

            const snapshot = await response.json();
            const refresh = new Date(snapshot.coverage?.latest_refresh || "");
            const now = new Date();
            const refreshTime = refresh.getTime();
            const ageMs = now.getTime() - refreshTime;
            const current = shanghaiParts(now);
            const refreshed = Number.isFinite(refreshTime) ? shanghaiParts(refresh) : {};
            const sameShanghaiDay =
              refreshed.year === current.year &&
              refreshed.month === current.month &&
              refreshed.day === current.day;
            const afterDailyWindow = Number(refreshed.hour) >= 6;
            const recentEnough = ageMs >= -5 * 60 * 1000 && ageMs <= 3 * 60 * 60 * 1000;
            const strictSupabase =
              snapshot.source?.kind === "supabase_public_views" &&
              snapshot.source?.data_source === "public_evidence_store" &&
              snapshot.source?.local_data_used === false;
            const reportFree =
              !Object.prototype.hasOwnProperty.call(snapshot, "reports") &&
              !Object.prototype.hasOwnProperty.call(snapshot, "report_quality_summary");

            if (sameShanghaiDay && afterDailyWindow && recentEnough && strictSupabase && reportFree) {
              writeDecision(
                "false",
                "production_already_fresh",
                `Strict Supabase snapshot refreshed at ${refresh.toISOString()}.`
              );
            } else {
              writeDecision(
                "true",
                "production_stale_or_invalid",
                `Production snapshot did not meet the daily freshness contract (latest_refresh=${snapshot.coverage?.latest_refresh || "missing"}).`
              );
            }
          } catch (error) {
            writeDecision(
              "true",
              "freshness_check_failed",
              `Freshness check failed closed: ${error instanceof Error ? error.message : String(error)}.`
            );
          }
          NODE

  refresh:
    name: Live refresh, persist, cluster, build, and deploy
    needs: freshness_gate
    if: ${{ needs.freshness_gate.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout default branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate production run configuration
        id: config
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE_EXPRESSION: ${{ github.event.schedule || '' }}
          DISPATCH_REF: ${{ github.ref }}
          LIMIT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.limit || github.event.schedule == '17 8 * * *' && '10' || '30' }}
          CHUNK_SIZE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.chunk_size || '5' }}
          MAX_ITEMS_PER_SOURCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_items_per_source || '3' }}
          RADAR_REFRESH_WRITE_GATE: ${{ vars.RADAR_REFRESH_WRITE_GATE }}
          HAS_NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL != '' || secrets.NEXT_PUBLIC_SUPABASE_URL != '' }}
          HAS_NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY != '' || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY != '' }}
          HAS_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
          HAS_DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY != '' }}
          HAS_CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' || secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
          HAS_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          set -euo pipefail

          validate_integer() {
            local name="$1"
            local value="$2"
            local minimum="$3"
            local maximum="$4"
            if [[ ! "$value" =~ ^[0-9]+$ || ${#value} -gt 4 ]]; then
              echo "::error title=Invalid refresh parameter::${name} must be an integer from ${minimum} to ${maximum}."
              exit 1
            fi

            local number=$((10#$value))
            if (( number < minimum || number > maximum )); then
              echo "::error title=Invalid refresh parameter::${name} must be an integer from ${minimum} to ${maximum}."
              exit 1
            fi
          }

          case "$EVENT_NAME" in
            schedule|workflow_dispatch) ;;
            *)
              echo "::error title=Unsupported trigger::Production refresh only accepts schedule or workflow_dispatch."
              exit 1
              ;;
          esac

          if [[ "$DISPATCH_REF" != "refs/heads/main" ]]; then
            echo "::error title=Unsafe production ref::Live persistence and production deployment must run from refs/heads/main."
            exit 1
          fi

          if [[ "$RADAR_REFRESH_WRITE_GATE" != "true" ]]; then
            echo "::error title=Production write gate closed::Set repository variable RADAR_REFRESH_WRITE_GATE=true before enabling the daily refresh."
            exit 1
          fi

          for required_flag in \
            HAS_NEXT_PUBLIC_SUPABASE_URL \
            HAS_NEXT_PUBLIC_SUPABASE_ANON_KEY \
            HAS_SUPABASE_SERVICE_ROLE_KEY \
            HAS_DEEPSEEK_API_KEY \
            HAS_CLOUDFLARE_ACCOUNT_ID \
            HAS_CLOUDFLARE_API_TOKEN; do
            if [[ "${!required_flag:-false}" != "true" ]]; then
              config_name="${required_flag#HAS_}"
              echo "::error title=Production configuration missing::${config_name} must be configured before live refresh starts."
              exit 1
            fi
          done

          validate_integer limit "$LIMIT" 1 100
          validate_integer chunk_size "$CHUNK_SIZE" 1 20
          validate_integer max_items_per_source "$MAX_ITEMS_PER_SOURCE" 1 20

          if (( 10#$CHUNK_SIZE > 10#$LIMIT )); then
            echo "::error title=Invalid refresh parameter::chunk_size cannot exceed limit."
            exit 1
          fi

          epoch_day=$(($(date -u +%s) / 86400))
          if (( 10#$LIMIT > 10 )); then
            rotating_slots=$((10#$LIMIT - 10))
          else
            rotating_slots=0
          fi
          rotation_offset=$((epoch_day * rotating_slots))
          refresh_started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          {
            echo "limit=$LIMIT"
            echo "chunk_size=$CHUNK_SIZE"
            echo "max_items_per_source=$MAX_ITEMS_PER_SOURCE"
            echo "rotation_offset=$rotation_offset"
            echo "refresh_started_at=$refresh_started_at"
            echo "schedule_expression=$SCHEDULE_EXPRESSION"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi
            if [[ "$attempt" == "3" ]]; then
              echo "::error title=Dependency installation failed::npm ci failed after 3 attempts."
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Run code and data preflight
        run: |
          npm run lint
          npm run typecheck
          npm run validate:data
          npm run sensitive:scan

      - name: Validate Supabase public read contract
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if npm run supabase:public-contract; then
              exit 0
            fi
            if [[ "$attempt" == "3" ]]; then
              echo "::error title=Supabase public contract failed::Contract validation failed after 3 attempts."
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Restore resumable activation state
        id: activation_cache_restore
        continue-on-error: true
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: data/activation
          key: radar-production-activation-main-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            radar-production-activation-main-

      - name: Prepare restored activation state
        id: activation_state
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");
          const checkpointPath = "data/activation/latest/checkpoint.json";
          let shouldResume = false;
          let reuseCompleted = false;
          let refreshNotBefore = process.env.REFRESH_STARTED_AT;
          let effectiveLimit = process.env.REQUESTED_LIMIT;

          function shanghaiDate(value) {
            return new Intl.DateTimeFormat("en-CA", {
              timeZone: "Asia/Shanghai",
              year: "numeric",
              month: "2-digit",
              day: "2-digit"
            }).format(value);
          }

          if (fs.existsSync(checkpointPath)) {
            try {
              const checkpoint = JSON.parse(fs.readFileSync(checkpointPath, "utf8"));
              const selectedCount = Math.min(
                Number(checkpoint.limit) || 0,
                Array.isArray(checkpoint.selected_source_ids) ? checkpoint.selected_source_ids.length : 0
              );
              const chunkSize = Number(checkpoint.chunk_size) || 0;
              const startedAt = new Date(checkpoint.started_at || "");
              const checkpointAgeMs = Date.now() - startedAt.getTime();
              const recentDailyCheckpoint =
                checkpoint.mode === "live" &&
                Number.isFinite(startedAt.getTime()) &&
                checkpointAgeMs >= 0 &&
                checkpointAgeMs <= 6 * 60 * 60 * 1000 &&
                shanghaiDate(startedAt) === shanghaiDate(new Date());
              if (selectedCount < 1 || chunkSize < 1 || !Array.isArray(checkpoint.chunks) || !recentDailyCheckpoint) {
                throw new Error("checkpoint shape is invalid");
              }

              const plannedChunks = Math.ceil(selectedCount / chunkSize);
              const chunksByIndex = new Map(checkpoint.chunks.map((chunk) => [chunk.index, chunk]));
              const fullyPersisted = Array.from({ length: plannedChunks }, (_, index) => chunksByIndex.get(index))
                .every((chunk) => chunk?.status === "completed" && chunk.persisted === true);

              if (fullyPersisted) {
                reuseCompleted = true;
                refreshNotBefore = checkpoint.started_at;
                effectiveLimit = String(checkpoint.limit);
                console.log("Restored a recent fully persisted activation; reusing it for cluster, build, and deploy recovery.");
              } else {
                shouldResume = true;
                refreshNotBefore = checkpoint.started_at;
                console.log("Restored an incomplete production activation; resuming from its checkpoint.");
              }
            } catch (error) {
              fs.rmSync("data/activation", { recursive: true, force: true });
              console.warn(`Discarded an invalid activation checkpoint: ${error.message}`);
            }
          } else {
            console.log("No prior activation checkpoint restored; starting a fresh daily run.");
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `resume=${shouldResume}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `reuse_completed=${reuseCompleted}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `refresh_not_before=${refreshNotBefore}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `effective_limit=${effectiveLimit}\n`);
          NODE
        env:
          REFRESH_STARTED_AT: ${{ steps.config.outputs.refresh_started_at }}
          REQUESTED_LIMIT: ${{ steps.config.outputs.limit }}

      - name: Run live resumable activation with persistence
        id: activation
        if: ${{ steps.activation_state.outputs.reuse_completed != 'true' }}
        timeout-minutes: ${{ github.event_name == 'schedule' && github.event.schedule == '17 8 * * *' && 20 || 45 }}
        shell: bash
        env:
          LIMIT: ${{ steps.config.outputs.limit }}
          CHUNK_SIZE: ${{ steps.config.outputs.chunk_size }}
          MAX_ITEMS_PER_SOURCE: ${{ steps.config.outputs.max_items_per_source }}
          ROTATION_OFFSET: ${{ steps.config.outputs.rotation_offset }}
          RESUME: ${{ steps.activation_state.outputs.resume }}
          ACTIVATION_RESET_INVALID_CHECKPOINT: "true"
          ENABLE_SUPABASE_WRITES: "true"
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for name in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY DEEPSEEK_API_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error title=Production configuration missing::${name} is required for live persisted activation."
              exit 1
            fi
          done

          args=(
            --limit "$LIMIT" \
            --chunk-size "$CHUNK_SIZE" \
            --max-items-per-source "$MAX_ITEMS_PER_SOURCE"
            --rotation-offset "$ROTATION_OFFSET"
          )
          if [[ "$RESUME" == "true" ]]; then
            args+=(--resume)
          fi
          npm run data:activate:resumable:live:persist -- "${args[@]}"

      - name: Save resumable activation state
        if: ${{ always() && steps.activation.outcome != 'skipped' && hashFiles('data/activation/latest/checkpoint.json') != '' }}
        continue-on-error: true
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: data/activation
          key: radar-production-activation-main-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Cluster, persist, and export the public snapshot
        id: events_cluster
        env:
          CLOUDFLARE_SNAPSHOT_READ_SUPABASE: "true"
          CLOUDFLARE_SNAPSHOT_REQUIRE_SUPABASE: "true"
          CLOUDFLARE_SNAPSHOT_EXPECTED_ATTEMPTED_SOURCES: ${{ steps.activation_state.outputs.effective_limit }}
          CLOUDFLARE_SNAPSHOT_MAX_SOURCE_FAILURE_RATE: "0.5"
          CLOUDFLARE_SNAPSHOT_MAX_REFRESH_AGE_HOURS: "6"
          CLOUDFLARE_SNAPSHOT_REFRESH_NOT_BEFORE: ${{ steps.activation_state.outputs.refresh_not_before }}
          ENABLE_SUPABASE_RETRIEVAL: "true"
          ENABLE_SUPABASE_WRITES: "true"
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npm run events:cluster -- --persist
          ENABLE_SUPABASE_WRITES=false npm run cloudflare:snapshot

      - name: Render Cloudflare site from the verified public snapshot
        id: cloudflare_build
        run: npx tsx scripts/build-cloudflare-public-site.ts

      - name: Validate built Cloudflare artifact
        env:
          ENABLE_SUPABASE_WRITES: "false"
          SMOKE_REQUIRE_RELEASE_ARTIFACTS: "true"
        run: npm run test

      - name: Deploy Cloudflare Pages production
        id: cloudflare_deploy
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" || -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "::error title=Cloudflare configuration missing::CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID are required."
            exit 1
          fi
          test -s dist/cloudflare-pages/index.html
          for attempt in 1 2 3; do
            if npm exec -- wrangler pages deploy dist/cloudflare-pages \
              --project-name=ai-industry-radar \
              --branch=main \
              --commit-hash="$GITHUB_SHA" \
              --commit-dirty=false; then
              exit 0
            fi
            if [[ "$attempt" == "3" ]]; then
              echo "::error title=Cloudflare deployment failed::Wrangler failed after 3 attempts."
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Verify production endpoint
        id: production_verify
        shell: bash
        env:
          VERIFY_CACHE_BUST: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          node <<'NODE'
          import * as fs from "node:fs";
          const local = JSON.parse(fs.readFileSync("dist/cloudflare-pages/data/radar-snapshot.json", "utf8"));
          const cacheBust = encodeURIComponent(process.env.VERIFY_CACHE_BUST || Date.now());
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          async function verify(attempt) {
            const requestId = `${cacheBust}-${attempt}`;
            const [homeResponse, snapshotResponse, reportsResponse] = await Promise.all([
              fetch(`https://ai-industry-radar.pages.dev/?verify=${requestId}`, { cache: "no-store" }),
              fetch(`https://ai-industry-radar.pages.dev/data/radar-snapshot.json?verify=${requestId}`, { cache: "no-store" }),
              fetch(`https://ai-industry-radar.pages.dev/reports/?verify=${requestId}`, { cache: "no-store", redirect: "manual" })
            ]);
            if (!homeResponse.ok || !snapshotResponse.ok) {
              throw new Error(`production_http_status home=${homeResponse.status} snapshot=${snapshotResponse.status}`);
            }

            const home = await homeResponse.text();
            const remote = await snapshotResponse.json();
            if (!home.includes("<title>AI 行业信息雷达</title>")) {
              throw new Error("production_home_title_mismatch");
            }
            if ((home.match(/<article class="top-story"/g) || []).length !== 10) {
              throw new Error("production_home_hotspot_count_mismatch");
            }
            if (
              !home.includes("Created by Song Luo") ||
              !home.includes('href="https://github.com/rrrrrredy"') ||
              home.includes("公众号") ||
              home.includes("数据状态")
            ) {
              throw new Error("production_home_reader_contract_mismatch");
            }
            if (reportsResponse.status !== 404) {
              throw new Error(`production_reports_route_not_retired status=${reportsResponse.status}`);
            }
            if (remote.generated_at !== local.generated_at) {
              throw new Error(`production_snapshot_generation_mismatch local=${local.generated_at} remote=${remote.generated_at}`);
            }
            if (remote.coverage?.latest_refresh !== local.coverage?.latest_refresh) {
              throw new Error(
                `production_snapshot_refresh_mismatch local=${local.coverage?.latest_refresh} remote=${remote.coverage?.latest_refresh}`
              );
            }
            const remoteRefreshTime = Date.parse(remote.coverage?.latest_refresh || "");
            if (!Number.isFinite(remoteRefreshTime) || Date.now() - remoteRefreshTime > 6 * 60 * 60 * 1000) {
              throw new Error("production_snapshot_refresh_is_stale");
            }
            if (
              remote.source?.kind !== "supabase_public_views" ||
              remote.source?.data_source !== "public_evidence_store" ||
              remote.source?.local_data_used !== false
            ) {
              throw new Error("production_snapshot_not_strict_supabase");
            }
            if (
              Object.prototype.hasOwnProperty.call(remote, "reports") ||
              Object.prototype.hasOwnProperty.call(remote, "report_quality_summary")
            ) {
              throw new Error("production_snapshot_contains_retired_report_fields");
            }
          }

          let lastError;
          for (let attempt = 1; attempt <= 12; attempt += 1) {
            try {
              await verify(attempt);
              console.log(`Production deployment verified on attempt ${attempt}.`);
              process.exit(0);
            } catch (error) {
              lastError = error;
              console.warn(`Production verification attempt ${attempt} failed: ${error.message}`);
              if (attempt < 12) await sleep(10000);
            }
          }
          throw lastError;
          NODE

      - name: Write production refresh summary
        if: ${{ always() }}
        shell: bash
        env:
          TRIGGER: ${{ github.event_name }}
          SCHEDULE_EXPRESSION: ${{ steps.config.outputs.schedule_expression }}
          FRESHNESS_REASON: ${{ needs.freshness_gate.outputs.reason }}
          ACTIVATION_REUSED: ${{ steps.activation_state.outputs.reuse_completed || 'false' }}
          ACTIVATION_OUTCOME: ${{ steps.activation.outcome || 'skipped' }}
          CLUSTER_OUTCOME: ${{ steps.events_cluster.outcome || 'skipped' }}
          BUILD_OUTCOME: ${{ steps.cloudflare_build.outcome || 'skipped' }}
          DEPLOY_OUTCOME: ${{ steps.cloudflare_deploy.outcome || 'skipped' }}
          VERIFY_OUTCOME: ${{ steps.production_verify.outcome || 'skipped' }}
        run: |
          {
            echo "## AI 行业信息雷达生产更新"
            echo
            echo "- Trigger: ${TRIGGER}"
            echo "- Target: production fresh before 09:00 Asia/Shanghai"
            echo "- Scheduled windows: 06:17 / 07:17 / 08:17 Asia/Shanghai"
            echo "- Current schedule expression: ${SCHEDULE_EXPRESSION:-manual}"
            echo "- Freshness gate: ${FRESHNESS_REASON}"
            echo "- Completed activation reused: ${ACTIVATION_REUSED}"
            echo "- Mode: live"
            echo "- Supabase persistence: enabled"
            echo "- Snapshot source: strict Supabase (local fallback disabled)"
            echo "- Production URL: https://ai-industry-radar.pages.dev/"
            echo
            echo "| Stage | Outcome |"
            echo "| --- | --- |"
            echo "| Live activation and persistence | ${ACTIVATION_OUTCOME} |"
            echo "| Event clustering and persistence | ${CLUSTER_OUTCOME} |"
            echo "| Strict Cloudflare build | ${BUILD_OUTCOME} |"
            echo "| Cloudflare production deploy | ${DEPLOY_OUTCOME} |"
            echo "| Production endpoint verification | ${VERIFY_OUTCOME} |"
          } >> "$GITHUB_STEP_SUMMARY"
